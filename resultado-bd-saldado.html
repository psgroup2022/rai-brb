<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado Ajustado — Plano BD Saldado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #0a1f3c;
    --navy-deep: #060e1c;
    --navy-mid:  #0d2348;
    --inst:      #004282;
    --blue:      #0074c8;
    --cyan:      #00aeef;
    --white:     #ffffff;
    --muted:     rgba(255,255,255,0.45);
    --faint:     rgba(255,255,255,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy-deep);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .shell {
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── card ── */
  .card {
    background: linear-gradient(158deg, #0f2850 0%, #0a1f3c 45%, #071530 100%);
    border: 1px solid rgba(0,174,239,0.22);
    border-radius: 32px;
    padding: 56px 64px 48px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,174,239,0.05),
      0 40px 100px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* Decorative halos */
  .card::before {
    content: '';
    position: absolute;
    top: -280px; right: -180px;
    width: 680px; height: 680px;
    background: radial-gradient(circle, rgba(0,174,239,0.08) 0%, transparent 68%);
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -200px; left: -120px;
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(0,66,130,0.10) 0%, transparent 72%);
    pointer-events: none;
  }

  /* ── header ── */
  .hd {
    position: relative;
    z-index: 2;
    margin-bottom: 44px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }
  .hd-left {}

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    border: 1px solid rgba(0,174,239,0.32);
    background: rgba(0,174,239,0.07);
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 16px;
  }
  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    flex-shrink: 0;
  }

  h1 {
    font-size: clamp(1.1rem, 2.5vw, 1.45rem);
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.025em;
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.33);
    letter-spacing: 0.04em;
  }

  /* ── svg chart ── */
  #chart {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
    position: relative;
    z-index: 2;
  }

  /* ── footer row ── */
  .foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 28px;
    padding-top: 22px;
    border-top: 1px solid rgba(255,255,255,0.07);
    position: relative;
    z-index: 2;
  }

  .legend {
    display: flex;
    gap: 22px;
    flex-wrap: wrap;
  }
  .leg {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }
  .leg-swatch {
    flex-shrink: 0;
    width: 22px;
    height: 10px;
    border-radius: 3px;
  }
  .leg-line {
    flex-shrink: 0;
    width: 22px;
    height: 2px;
    border-radius: 2px;
    background: #fff;
    position: relative;
  }
  .leg-line::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    border: 1.5px solid #0a1f3c;
  }

  /* ── export button ── */
  .btn-exp {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    background: transparent;
    border: 1px solid rgba(0,174,239,0.4);
    color: var(--cyan);
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-radius: 9px;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-exp:hover {
    background: rgba(0,174,239,0.09);
    border-color: var(--cyan);
  }

  /* ── bar entrance animation ── */
  @keyframes growUp {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }
  @keyframes growDown {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .bar-up   { transform-origin: bottom center; animation: growUp 0.7s cubic-bezier(.22,.68,0,1.2) both; }
  .bar-down { transform-origin: top center;    animation: growDown 0.7s cubic-bezier(.22,.68,0,1.2) both; }
  .fade-in  { animation: fadeIn 0.6s ease both; }

  @media (max-width: 600px) {
    .card { padding: 32px 24px 32px; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="card" id="infographic">

    <div class="hd">
      <div class="hd-left">
        <div class="badge">Resultado Atuarial · 2021–2025</div>
        <h1>Resultado Ajustado — Plano BD Saldado</h1>
        <div class="meta">Valores em R$ mil</div>
      </div>
    </div>

    <svg id="chart" viewBox="0 0 1040 520" xmlns="http://www.w3.org/2000/svg" aria-label="Gráfico de resultado ajustado do Plano BD Saldado"></svg>

    <div class="foot">
      <div class="legend">
        <div class="leg">
          <div class="leg-swatch" style="background:linear-gradient(180deg,rgba(0,174,239,0.82),rgba(0,66,130,0.42))"></div>
          Limite Superior
        </div>
        <div class="leg">
          <div class="leg-swatch" style="background:linear-gradient(180deg,rgba(255,224,51,0.90),rgba(201,148,0,0.60))"></div>
          Limite Inferior
        </div>
        <div class="leg">
          <div class="leg-line"></div>
          Resultado Técnico Ajustado
        </div>
      </div>
      <button class="btn-exp" onclick="exportSVG()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
          <path d="M5.5 1v6M2 7.5l3.5 2.5 3.5-2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Exportar SVG
      </button>
    </div>

  </div><!-- .card -->
</div><!-- .shell -->

<script>
/* ── Data ─────────────────────────────────────── */
const DATA = [
  { year:2021, ls:1344002, lsp:24.38, li:-572221, lip:-10.38, rt:-111278, rtp:-2.02 },
  { year:2022, ls:1361314, lsp:23.96, li:-565888, lip: -9.96, rt:-132646, rtp:-2.33 },
  { year:2023, ls:1366359, lsp:23.64, li:-557178, lip: -9.64, rt: -12134, rtp:-0.21 },
  { year:2024, ls:1643105, lsp:23.40, li:-660051, lip: -9.40, rt:-239630, rtp:-3.41 },
  { year:2025, ls:1514368, lsp:22.54, li:-573767, lip: -8.54, rt:   5752, rtp: 0.09 },
];

/* ── SVG layout ───────────────────────────────── */
const NS   = 'http://www.w3.org/2000/svg';
const VW   = 1040, VH = 520;
const ML   = 32,  MR = 32;
const MT   = 108, MB = 92;
const CW   = VW - ML - MR;   // 976
const CH   = VH - MT - MB;   // 320

/* scale */
const GMAX   = Math.max(...DATA.map(d => d.ls)) * 1.10;  // ~1 807 416
const GMIN   = Math.min(...DATA.map(d => d.li)) * 1.14;  // ~~-752 458
const GRANGE = GMAX - GMIN;

const sy = v => MT + (1 - (v - GMIN) / GRANGE) * CH;
const ZERO_Y = sy(0);

const N      = DATA.length;
const COL_W  = CW / N;           // 195.2
const BAR_W  = COL_W * 0.50;     // 97.6
const bx     = i => ML + i * COL_W + COL_W / 2;

/* ── helpers ──────────────────────────────────── */
const svg = document.getElementById('chart');

function mk(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function tx(s, attrs = {}) {
  const e = mk('text', attrs);
  e.textContent = s;
  return e;
}
const fN = n => new Intl.NumberFormat('pt-BR').format(Math.round(n));
const fP = (n, plus = false) => {
  const abs  = Math.abs(n).toFixed(2).replace('.', ',') + '%';
  const sign = n >= 0 ? (plus && n > 0 ? '+' : '') : '−';
  return sign + abs;
};

/* ── DEFS ─────────────────────────────────────── */
const defs = mk('defs');

/* gradients */
function linGrad(id, stops, x1=0,y1=0,x2=0,y2=1) {
  const g = mk('linearGradient', { id, x1, y1, x2, y2, gradientUnits:'objectBoundingBox' });
  stops.forEach(([off, col, op]) => {
    g.appendChild(mk('stop', { offset:off, 'stop-color':col, 'stop-opacity':op }));
  });
  return g;
}
defs.appendChild(linGrad('gLS',
  [[0,'#00aeef',0.85],[0.55,'#0074c8',0.60],[1,'#004282',0.38]]));
defs.appendChild(linGrad('gLI',
  [[0,'#ffe033',0.90],[0.55,'#f5c200',0.72],[1,'#c99400',0.45]]));

/* subtle bar shine */
defs.appendChild(linGrad('gShine',
  [[0,'#fff',0.10],[0.4,'#fff',0.02],[1,'#fff',0.00]]));

/* glow filter for the RT line */
const flt = mk('filter', { id:'glow', x:'-30%', y:'-80%', width:'160%', height:'260%' });
flt.appendChild(mk('feGaussianBlur', { in:'SourceGraphic', stdDeviation:'3', result:'b' }));
const fm = mk('feMerge');
[mk('feMergeNode',{in:'b'}), mk('feMergeNode',{in:'SourceGraphic'})].forEach(n=>fm.appendChild(n));
flt.appendChild(fm);
defs.appendChild(flt);

svg.appendChild(defs);

/* ── SUBTLE GRID ──────────────────────────────── */
const gridG = mk('g');
// horizontal guide lines (faint)
[GMAX*0.45, GMAX*0.22, 0, GMIN*0.38].forEach(v => {
  gridG.appendChild(mk('line', {
    x1: ML, y1: sy(v), x2: ML+CW, y2: sy(v),
    stroke:'rgba(255,255,255,0.04)', 'stroke-width':1
  }));
});
svg.appendChild(gridG);

/* ── ZERO AXIS ────────────────────────────────── */
svg.appendChild(mk('line', {
  x1:ML, y1:ZERO_Y, x2:ML+CW, y2:ZERO_Y,
  stroke:'#4ade80', 'stroke-width':1.5, 'stroke-dasharray':'7 5', opacity:0.75
}));
svg.appendChild(tx('0', {
  x:ML-10, y:ZERO_Y+4,
  fill:'#4ade80',
  'font-size':10, 'font-family':'DM Mono,monospace',
  'text-anchor':'end'
}));

/* ── BARS PER YEAR ────────────────────────────── */
DATA.forEach((d, i) => {
  const cx   = bx(i);
  const half = BAR_W / 2;
  const g    = mk('g', { class:'fade-in', style:`animation-delay:${i * 0.08}s` });

  /* column subtle divider */
  if (i > 0) {
    svg.appendChild(mk('line', {
      x1: cx - COL_W/2, y1: MT,
      x2: cx - COL_W/2, y2: MT+CH,
      stroke:'rgba(255,255,255,0.04)', 'stroke-width':1
    }));
  }

  /* ─ LIMITE SUPERIOR bar ─ */
  const lsTop = sy(d.ls);
  const lsH   = ZERO_Y - lsTop;

  const lsBar = mk('rect', {
    x: cx - half, y: lsTop,
    width: BAR_W, height: lsH,
    rx: 8,
    fill: 'url(#gLS)',
    class: 'bar-up',
    style: `animation-delay:${i * 0.09}s`
  });
  g.appendChild(lsBar);

  /* shine overlay on LS bar */
  g.appendChild(mk('rect', {
    x: cx - half, y: lsTop,
    width: BAR_W * 0.55, height: lsH,
    rx: 8,
    fill: 'url(#gShine)',
    class: 'bar-up',
    style: `animation-delay:${i * 0.09}s`
  }));

  /* LS label — ABOVE bar, white text */
  g.appendChild(tx(fP(d.lsp), {
    x: cx, y: lsTop - 18,
    fill: '#ffffff',
    'font-size': 10.5, 'font-family': 'DM Mono,monospace', 'font-weight': 700,
    'text-anchor': 'middle'
  }));
  g.appendChild(tx(fN(d.ls), {
    x: cx, y: lsTop - 6,
    fill: 'rgba(255,255,255,0.65)',
    'font-size': 9, 'font-family': 'DM Mono,monospace',
    'text-anchor': 'middle'
  }));

  /* ─ LIMITE INFERIOR bar ─ */
  const liBot = sy(d.li);
  const liH   = liBot - ZERO_Y;
  g.appendChild(mk('rect', {
    x: cx - half, y: ZERO_Y,
    width: BAR_W, height: liH,
    rx: 8,
    fill: 'url(#gLI)',
    class: 'bar-down',
    style: `animation-delay:${i * 0.09 + 0.06}s`
  }));

  /* LI label — below bar */
  g.appendChild(tx(fP(d.lip), {
    x: cx, y: liBot + 16,
    fill: 'rgba(0,174,239,0.52)',
    'font-size': 10, 'font-family': 'DM Mono,monospace',
    'text-anchor': 'middle'
  }));
  g.appendChild(tx(fN(d.li), {
    x: cx, y: liBot + 29,
    fill: 'rgba(255,255,255,0.32)',
    'font-size': 9, 'font-family': 'DM Mono,monospace',
    'text-anchor': 'middle'
  }));

  /* ─ YEAR LABEL ─ */
  g.appendChild(tx(String(d.year), {
    x: cx, y: VH - MB + 38,
    fill: 'rgba(255,255,255,0.88)',
    'font-size': 15, 'font-family': 'Sora,sans-serif', 'font-weight': 700,
    'text-anchor': 'middle'
  }));

  svg.appendChild(g);
});

/* ── RESULTADO TÉCNICO AJUSTADO LINE ─────────── */
const rtPts = DATA.map((d, i) => ({ x: bx(i), y: sy(d.rt), d }));

/* Build smooth cubic bezier path */
let pd = `M ${rtPts[0].x} ${rtPts[0].y}`;
for (let i = 1; i < rtPts.length; i++) {
  const p = rtPts[i - 1], c = rtPts[i];
  const cpx = (p.x + c.x) / 2;
  pd += ` C ${cpx} ${p.y} ${cpx} ${c.y} ${c.x} ${c.y}`;
}

const lineG = mk('g');

/* Glow halo pass */
lineG.appendChild(mk('path', {
  d: pd, fill:'none',
  stroke: 'rgba(255,255,255,0.18)', 'stroke-width': 9,
  'stroke-linecap':'round'
}));

/* Main white line */
lineG.appendChild(mk('path', {
  d: pd, fill:'none',
  stroke: '#ffffff', 'stroke-width': 2.2,
  'stroke-linecap': 'round', 'stroke-linejoin': 'round',
  filter:'url(#glow)',
  class:'fade-in', style:'animation-delay:0.45s'
}));

/* Markers + callout boxes */
rtPts.forEach(({ x, y, d }, i) => {
  const isPos = d.rt >= 0;

  /* outer glow ring */
  lineG.appendChild(mk('circle', {
    cx: x, cy: y, r: 10,
    fill: 'rgba(255,255,255,0.06)'
  }));

  /* dot */
  lineG.appendChild(mk('circle', {
    cx: x, cy: y, r: 5.5,
    fill: '#0a1f3c',
    stroke: '#ffffff', 'stroke-width': 2.2
  }));
  lineG.appendChild(mk('circle', {
    cx: x, cy: y, r: 2,
    fill: '#00aeef'
  }));

  /* callout — always above the zero line, no background box */
  const labelY = Math.min(y, ZERO_Y) - 52;

  /* connector line */
  lineG.appendChild(mk('line', {
    x1: x, y1: labelY + 16,
    x2: x, y2: y - 7,
    stroke: 'rgba(255,255,255,0.30)', 'stroke-width': 1, 'stroke-dasharray':'3 3'
  }));

  /* percentage — bold, white (cyan if positive) */
  lineG.appendChild(tx(fP(d.rtp, true), {
    x, y: labelY,
    fill: isPos ? '#00aeef' : '#ffffff',
    'font-size': 11, 'font-family': 'DM Mono,monospace', 'font-weight': 700,
    'text-anchor': 'middle'
  }));

  /* absolute value — smaller, muted */
  lineG.appendChild(tx(fN(d.rt), {
    x, y: labelY + 13,
    fill: 'rgba(255,255,255,0.50)',
    'font-size': 9, 'font-family': 'DM Mono,monospace',
    'text-anchor': 'middle'
  }));
});

svg.appendChild(lineG);

/* ── EXPORT ─────────────────────────────────── */
function exportSVG() {
  const orig  = document.getElementById('chart');
  const clone = orig.cloneNode(true);
  clone.setAttribute('xmlns', NS);
  clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

  /* embed font reference */
  const style = document.createElementNS(NS, 'style');
  style.textContent = "@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');";
  clone.insertBefore(style, clone.firstChild);

  /* expand viewBox for title + legend */
  clone.setAttribute('viewBox', '0 -90 1040 660');

  /* background for standalone */
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('x', '0'); bg.setAttribute('y', '-90');
  bg.setAttribute('width',  '1040');
  bg.setAttribute('height', '660');
  bg.setAttribute('fill',   '#0a1f3c');
  clone.insertBefore(bg, style.nextSibling);

  /* title block */
  const titleG = document.createElementNS(NS, 'g');
  const tLabel = document.createElementNS(NS, 'text');
  tLabel.textContent = 'RESULTADO ATUARIAL · 2021–2025';
  tLabel.setAttribute('x', '32'); tLabel.setAttribute('y', '-62');
  tLabel.setAttribute('fill', '#00aeef'); tLabel.setAttribute('font-size', '9.5');
  tLabel.setAttribute('font-family', 'DM Mono,monospace'); tLabel.setAttribute('font-weight', '500');
  tLabel.setAttribute('letter-spacing', '0.18em');
  const tMain = document.createElementNS(NS, 'text');
  tMain.textContent = 'Resultado Ajustado — Plano BD Saldado';
  tMain.setAttribute('x', '32'); tMain.setAttribute('y', '-38');
  tMain.setAttribute('fill', '#ffffff'); tMain.setAttribute('font-size', '18');
  tMain.setAttribute('font-family', 'Sora,sans-serif'); tMain.setAttribute('font-weight', '800');
  const tSub = document.createElementNS(NS, 'text');
  tSub.textContent = 'Valores em R$ mil';
  tSub.setAttribute('x', '32'); tSub.setAttribute('y', '-20');
  tSub.setAttribute('fill', 'rgba(255,255,255,0.35)'); tSub.setAttribute('font-size', '10');
  tSub.setAttribute('font-family', 'DM Mono,monospace');
  [tLabel,tMain,tSub].forEach(t => titleG.appendChild(t));
  clone.insertBefore(titleG, style.nextSibling.nextSibling);

  /* legend block at bottom of exported SVG */
  const legG   = document.createElementNS(NS, 'g');
  const legY   = 502;
  const legX   = 32;
  const legItems = [
    { color1:'#00aeef', color2:'#004282', label:'Limite Superior',             type:'rect' },
    { color1:'#ffe033', color2:'#c99400', label:'Limite Inferior',             type:'rect' },
    { color1:'#ffffff', color2:'#ffffff', label:'Resultado Técnico Ajustado',  type:'line' },
  ];
  const sep = document.createElementNS(NS, 'line');
  sep.setAttribute('x1', legX); sep.setAttribute('y1', legY - 8);
  sep.setAttribute('x2', 1008); sep.setAttribute('y2', legY - 8);
  sep.setAttribute('stroke', 'rgba(255,255,255,0.10)'); sep.setAttribute('stroke-width', '1');
  legG.appendChild(sep);

  legItems.forEach((item, idx) => {
    const ox = legX + idx * 220;
    if (item.type === 'rect') {
      // gradient swatch
      const gradId = `legGrad${idx}`;
      const lg2 = document.createElementNS(NS, 'linearGradient');
      lg2.setAttribute('id', gradId); lg2.setAttribute('x1','0'); lg2.setAttribute('y1','0');
      lg2.setAttribute('x2','1'); lg2.setAttribute('y2','0');
      lg2.setAttribute('gradientUnits','objectBoundingBox');
      const s1 = document.createElementNS(NS, 'stop');
      s1.setAttribute('offset','0'); s1.setAttribute('stop-color', item.color1); s1.setAttribute('stop-opacity','0.9');
      const s2 = document.createElementNS(NS, 'stop');
      s2.setAttribute('offset','1'); s2.setAttribute('stop-color', item.color2); s2.setAttribute('stop-opacity','0.6');
      lg2.appendChild(s1); lg2.appendChild(s2);
      clone.querySelector('defs').appendChild(lg2);
      const sw = document.createElementNS(NS, 'rect');
      sw.setAttribute('x', ox); sw.setAttribute('y', legY + 4);
      sw.setAttribute('width','22'); sw.setAttribute('height','10');
      sw.setAttribute('rx','3'); sw.setAttribute('fill', `url(#${gradId})`);
      legG.appendChild(sw);
    } else {
      // line with dot
      const ln = document.createElementNS(NS, 'line');
      ln.setAttribute('x1', ox); ln.setAttribute('y1', legY + 9);
      ln.setAttribute('x2', ox + 22); ln.setAttribute('y2', legY + 9);
      ln.setAttribute('stroke', '#fff'); ln.setAttribute('stroke-width','2');
      legG.appendChild(ln);
      const dot = document.createElementNS(NS, 'circle');
      dot.setAttribute('cx', ox + 11); dot.setAttribute('cy', legY + 9);
      dot.setAttribute('r','4'); dot.setAttribute('fill','#0a1f3c');

    }
    const lbl = document.createElementNS(NS, 'text');
    lbl.textContent = item.label;
    lbl.setAttribute('x', ox + 28); lbl.setAttribute('y', legY + 14);
    lbl.setAttribute('fill', 'rgba(255,255,255,0.55)');
    lbl.setAttribute('font-size', '10'); lbl.setAttribute('font-family', 'Sora,sans-serif');
    legG.appendChild(lbl);
  });
  clone.appendChild(legG);

  const ser  = new XMLSerializer();
  let   str  = ser.serializeToString(clone);
  str = '<?xml version="1.0" encoding="UTF-8"?>\n' + str;

  const blob = new Blob([str], { type:'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'resultado-ajustado-bd-saldado.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
